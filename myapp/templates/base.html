<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

{% block title %}{% endblock %}

<style>

.nav-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:white;
border-bottom:1px solid #eee;
}

.logo{
font-size:22px;
font-weight:700;
letter-spacing:2px;
}

.menu a{
text-decoration:none;
color:black;
margin-left:30px;
font-weight:500;
transition:0.3s;
}

.menu a:hover{
color:#888;
}

</style>

<style>

.nav-bar{
padding:15px 40px;
background:white;
border-bottom:1px solid #eee;
}

.nav-bar a{
text-decoration:none;
color:black;
margin-right:25px;
font-weight:500;
transition:0.2s;
}

.nav-bar a:hover{
color:#888;
}

</style>

</head>

<body>

<div class="nav-bar">

<div class="logo">
ESSENTIAL
</div>

<div class="menu">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/form">Contact</a>
</div>

</div>

{% block content %}

{% endblock %}

</body>
</html>
